<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" width="1100" height="750" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="750" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">NYC Taxi Data Pipeline — Medallion Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748B">DLMDSEDE02 | IU International University of Applied Sciences | Vamshi Krishna Kasarala</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1: External Source -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="420" y="78" width="260" height="56" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="550" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">NYC TLC Data Source</text>
  <text x="550" y="116" text-anchor="middle" font-size="10" fill="#1E40AF">d37ci6vzurychx.cloudfront.net</text>
  <text x="550" y="129" text-anchor="middle" font-size="10" fill="#1E40AF">Yellow/Green Taxi Parquet (~3M rows/month)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2: ORCHESTRATION (Airflow) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="162" width="980" height="42" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="550" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Apache Airflow 2.9.3 — Workflow Orchestration (port 8083)</text>
  <text x="550" y="197" text-anchor="middle" font-size="10" fill="#78350F">nyc_taxi_batch  |  nyc_taxi_kafka_batch  |  nyc_phase3_eval  |  load_taxi_zone_lookup_daily</text>

  <!-- Arrow: Source → Airflow -->
  <line x1="550" y1="134" x2="550" y2="160" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3: INGESTION (two paths) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Batch path box -->
  <rect x="60" y="228" width="340" height="70" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="230" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Batch Ingestion Path</text>
  <text x="230" y="266" text-anchor="middle" font-size="10" fill="#064E3B">download_nyc_tlc.py</text>
  <text x="230" y="280" text-anchor="middle" font-size="10" fill="#064E3B">urllib → Local disk → WebHDFS (port 9870)</text>
  <text x="230" y="294" text-anchor="middle" font-size="10" fill="#064E3B">HDFS Raw Zone: /datalake/nyc/raw/</text>

  <!-- Kafka path box -->
  <rect x="420" y="228" width="340" height="70" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="590" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C2D12">Kafka Streaming Path</text>
  <text x="590" y="266" text-anchor="middle" font-size="10" fill="#7C2D12">kafka_producer.py → topic: trips_raw</text>
  <text x="590" y="280" text-anchor="middle" font-size="10" fill="#7C2D12">Confluent Kafka 6.1.0 + Zookeeper (port 9092)</text>
  <text x="590" y="294" text-anchor="middle" font-size="10" fill="#7C2D12">spark_kafka_to_bronze_batch.py (assign mode)</text>

  <!-- Ref lookup box -->
  <rect x="780" y="228" width="260" height="70" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="910" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#4C1D95">Reference Data</text>
  <text x="910" y="266" text-anchor="middle" font-size="10" fill="#4C1D95">load_taxi_zone.py</text>
  <text x="910" y="280" text-anchor="middle" font-size="10" fill="#4C1D95">265 NYC Taxi Zones CSV</text>
  <text x="910" y="294" text-anchor="middle" font-size="10" fill="#4C1D95">psycopg2 → PostgreSQL</text>

  <!-- Arrows: Airflow → Ingestion rows -->
  <line x1="300" y1="204" x2="230" y2="226" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="204" x2="590" y2="226" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="800" y1="204" x2="910" y2="226" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 4: SPARK PROCESSING -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="326" width="980" height="42" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="550" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#7F1D1D">Apache Spark 3.1.2 — Distributed Processing (Master: port 8080 | History: 18081)</text>
  <text x="550" y="361" text-anchor="middle" font-size="10" fill="#991B1B">nyc_bronze_to_silver.py (--stage bronze/silver)  |  nyc_silver_to_gold.py  |  dq_check_silver.py  |  evaluate_gold_metrics.py</text>

  <!-- Arrows: Ingestion → Spark -->
  <line x1="230" y1="298" x2="350" y2="324" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="590" y1="298" x2="550" y2="324" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 5: HDFS MEDALLION LAYERS -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- HDFS label band -->
  <rect x="60" y="392" width="700" height="24" rx="6" fill="#1E293B"/>
  <text x="410" y="408" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Apache Hadoop HDFS 3.2.1  —  hdfs://namenode:9000/datalake/nyc/  (NameNode: 9870 | DataNode: 9864)</text>

  <!-- Bronze -->
  <rect x="60" y="422" width="210" height="80" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="165" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">🥉 Bronze Layer</text>
  <text x="165" y="462" text-anchor="middle" font-size="10" fill="#78350F">/bronze/yellow_tripdata/</text>
  <text x="165" y="476" text-anchor="middle" font-size="10" fill="#78350F">Raw Parquet, partitioned</text>
  <text x="165" y="490" text-anchor="middle" font-size="10" fill="#78350F">by year= / month=</text>
  <text x="165" y="497" text-anchor="middle" font-size="9" fill="#92400E">nyc_bronze_to_silver.py --stage bronze</text>

  <!-- Silver -->
  <rect x="295" y="422" width="210" height="80" rx="8" fill="#E2E8F0" stroke="#64748B" stroke-width="2"/>
  <text x="400" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">🥈 Silver Layer</text>
  <text x="400" y="462" text-anchor="middle" font-size="10" fill="#475569">/silver/yellow_tripdata/</text>
  <text x="400" y="476" text-anchor="middle" font-size="10" fill="#475569">Filtered &amp; typed Parquet</text>
  <text x="400" y="490" text-anchor="middle" font-size="10" fill="#475569">trip_distance&gt;0, fare≥0</text>
  <text x="400" y="497" text-anchor="middle" font-size="9" fill="#334155">nyc_bronze_to_silver.py --stage silver</text>

  <!-- Gold -->
  <rect x="530" y="422" width="230" height="80" rx="8" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text x="645" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#713F12">🥇 Gold Layer</text>
  <text x="645" y="462" text-anchor="middle" font-size="10" fill="#854D0E">/gold/kpis_trips_monthly/</text>
  <text x="645" y="476" text-anchor="middle" font-size="10" fill="#854D0E">Monthly KPIs (trips, fare,</text>
  <text x="645" y="490" text-anchor="middle" font-size="10" fill="#854D0E">tip, avg_distance)</text>
  <text x="645" y="497" text-anchor="middle" font-size="9" fill="#713F12">nyc_silver_to_gold.py + JDBC write</text>

  <!-- Arrows between HDFS layers -->
  <line x1="270" y1="462" x2="293" y2="462" stroke="#D97706" stroke-width="2" marker-end="url(#arrgold)"/>
  <line x1="505" y1="462" x2="528" y2="462" stroke="#64748B" stroke-width="2" marker-end="url(#arrgrey)"/>

  <!-- Arrow: Spark → HDFS -->
  <line x1="400" y1="368" x2="400" y2="420" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 5 RIGHT: Data Quality -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="780" y="392" width="260" height="112" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="910" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532D">Data Quality &amp; Metrics</text>
  <text x="910" y="428" text-anchor="middle" font-size="10" fill="#166534">dq_check_silver.py</text>
  <text x="910" y="442" text-anchor="middle" font-size="10" fill="#166534">• Null rate check (&lt;5%)</text>
  <text x="910" y="456" text-anchor="middle" font-size="10" fill="#166534">• Bad value rate (&lt;2%)</text>
  <text x="910" y="470" text-anchor="middle" font-size="10" fill="#166534">evaluate_gold_metrics.py</text>
  <text x="910" y="484" text-anchor="middle" font-size="10" fill="#166534">• Months covered, row count</text>
  <text x="910" y="498" text-anchor="middle" font-size="10" fill="#166534">• Fare/tip/distance totals</text>

  <!-- Arrow: Spark → DQ -->
  <line x1="760" y1="347" x2="910" y2="390" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrgreen)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 6: ANALYTICAL WAREHOUSE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="534" width="700" height="80" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="410" y="554" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">PostgreSQL 15 — Analytical Warehouse (port 5432)</text>

  <!-- Tables inside PG box -->
  <rect x="80" y="562" width="155" height="40" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="157" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">fact_trips_monthly</text>
  <text x="157" y="592" text-anchor="middle" font-size="9" fill="#1D4ED8">year, month, trips, fare, tip, dist</text>

  <rect x="255" y="562" width="140" height="40" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="325" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">dq_results</text>
  <text x="325" y="592" text-anchor="middle" font-size="9" fill="#1D4ED8">null_rate, bad_rate, passed</text>

  <rect x="415" y="562" width="155" height="40" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="492" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">metrics_pipeline_runs</text>
  <text x="492" y="592" text-anchor="middle" font-size="9" fill="#1D4ED8">rows_gold, fare_total, dist_avg</text>

  <rect x="590" y="562" width="155" height="40" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="667" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">taxi_zone_lookup</text>
  <text x="667" y="592" text-anchor="middle" font-size="9" fill="#5B21B6">265 zones, borough, zone</text>

  <!-- Arrow: Gold → Postgres -->
  <line x1="645" y1="502" x2="450" y2="532" stroke="#CA8A04" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow: DQ → Postgres -->
  <line x1="860" y1="504" x2="600" y2="532" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 6 RIGHT: Adminer -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="780" y="534" width="260" height="40" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
  <text x="910" y="552" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">Adminer (port 8082)</text>
  <text x="910" y="566" text-anchor="middle" font-size="10" fill="#9D174D">Web-based PostgreSQL UI</text>
  <!-- Arrow: PG → Adminer -->
  <line x1="762" y1="568" x2="778" y2="562" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 7: VISUALIZATION -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="644" width="700" height="50" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="410" y="665" text-anchor="middle" font-size="12" font-weight="bold" fill="#881337">Apache Superset 3.1.0 — Business Intelligence (port 8089)</text>
  <text x="410" y="682" text-anchor="middle" font-size="10" fill="#9F1239">Interactive dashboards · KPI charts · Trip trend analysis · Connected to PostgreSQL via SQLAlchemy</text>

  <!-- Arrow: Postgres → Superset -->
  <line x1="410" y1="614" x2="410" y2="642" stroke="#F43F5E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="780" y="596" width="260" height="96" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="910" y="614" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Legend</text>
  <line x1="800" y1="626" x2="840" y2="626" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="848" y="630" font-size="10" fill="#475569">Data flow</text>
  <line x1="800" y1="642" x2="840" y2="642" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrgreen)"/>
  <text x="848" y="646" font-size="10" fill="#475569">DQ / metrics write</text>
  <rect x="800" y="654" width="16" height="10" rx="2" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <text x="824" y="663" font-size="10" fill="#475569">Batch path</text>
  <rect x="800" y="669" width="16" height="10" rx="2" fill="#FFF7ED" stroke="#F97316" stroke-width="1"/>
  <text x="824" y="678" font-size="10" fill="#475569">Kafka path</text>
  <rect x="875" y="654" width="16" height="10" rx="2" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1"/>
  <text x="899" y="663" font-size="10" fill="#475569">Gold KPIs</text>
  <rect x="875" y="669" width="16" height="10" rx="2" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="899" y="678" font-size="10" fill="#475569">DQ / Metrics</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW MARKERS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrgold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
    <marker id="arrgrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
    <marker id="arrgreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22C55E"/>
    </marker>
  </defs>

</svg>
