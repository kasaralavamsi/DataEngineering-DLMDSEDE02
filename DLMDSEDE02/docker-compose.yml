services:
  # ---------------- HDFS ----------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - CLUSTER_NAME=de-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      # Disable HDFS permission checking so Airflow / Spark tasks can write to
      # HDFS without needing to impersonate the hdfs superuser.  Appropriate for
      # a dev / academic environment where all services share a private network.
      - HDFS_CONF_dfs_permissions_enabled=false
    ports:
      - "9870:9870"   # NN UI
      - "9000:9000"   # HDFS RPC
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
    networks: [de-net]
    healthcheck:
      # Simple HTTP liveness check on the NameNode web UI.
      # start_period: 60s gives the NameNode time to exit safe mode (typically
      # 20–30 s after startup) before any failed checks are counted — so
      # dependent services never see an unhealthy NameNode due to safe mode.
      test: ["CMD", "curl", "-f", "http://localhost:9870/jmx"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_permissions_enabled=false
    ports:
      - "9864:9864"   # DN UI
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    networks: [de-net]

  # ----------- Postgres + Adminer -----------
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nyc
      - POSTGRES_PASSWORD=nyc
      - POSTGRES_DB=nyc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init_postgres.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./sql/init_phase3_metrics.sql:/docker-entrypoint-initdb.d/01_metrics.sql:ro
    networks: [de-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyc -d nyc"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks: [de-net]
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------- Kafka + Zookeeper ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:6.1.0
    platform: linux/amd64
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks: [de-net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:6.1.0
    platform: linux/amd64
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Reduce __consumer_offsets leader-election time so the broker is truly
      # ready sooner after startup (defaults are 3000 ms each).
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
    # Delete stale meta.properties before startup so a ZooKeeper volume wipe
    # (docker compose down -v, or just ZK data lost) never causes:
    #   InconsistentClusterIdException: The Cluster ID X doesn't match stored Y
    # Kafka will simply ask ZooKeeper for the current cluster ID on each start.
    entrypoint: >
      bash -c "
        if [ -f /var/lib/kafka/data/meta.properties ]; then
          echo '▶ Removing stale meta.properties to prevent cluster-ID mismatch';
          rm -f /var/lib/kafka/data/meta.properties;
        fi;
        exec /etc/confluent/docker/run
      "
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks: [de-net]
    healthcheck:
      # Use the broker API versions command instead of a bare TCP check.
      # The broker only responds to this command once the controller and
      # __consumer_offsets leader are fully elected – exactly the state
      # Spark needs before it can resolve the group coordinator.
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ---------------- Spark ----------------
  spark-master:
    image: bde2020/spark-master:3.1.2-hadoop3.2
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8090
      - SPARK_HOME=/spark
      - SPARK_EVENTLOG_ENABLED=true
      - SPARK_EVENTLOG_DIR=/tmp/spark-events
    ports:
      - "8090:8090"   # Spark Master UI
      - "7077:7077"   # Spark cluster port
    volumes:
      - ./src/spark_jobs:/opt/spark/src/spark_jobs
      - ./jars:/opt/spark/extra-jars:ro
      - spark-events:/tmp/spark-events
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
      kafka:
        condition: service_healthy   # wait for broker to be truly ready
    networks: [de-net]
    # No healthcheck: the bde2020 image has no standard tools (curl/nc/python3)
    # in PATH to probe port 7077. Spark master binds 7077 within ~5 s of JVM
    # start, so the service_started condition below is safe. Job-level retries
    # in the SparkSubmitOperator DAGs provide protection against any timing gap.

  spark-worker-1:
    image: bde2020/spark-worker:3.1.2-hadoop3.2
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_HOME=/spark
      - SPARK_EVENTLOG_ENABLED=true
      - SPARK_EVENTLOG_DIR=/tmp/spark-events
    ports:
      - "8081:8081"   # Worker UI
    volumes:
      - ./src/spark_jobs:/opt/spark/src/spark_jobs
      - ./jars:/opt/spark/extra-jars:ro
      - spark-events:/tmp/spark-events
    depends_on: [spark-master]
    networks: [de-net]

  spark-history:
    image: bde2020/spark-history-server:3.1.2-hadoop3.2
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/tmp/spark-events
    ports:
      - "18081:18081"   # History Server UI
    volumes:
      - spark-events:/tmp/spark-events
    depends_on: [spark-master]
    networks: [de-net]

  # -------- One-shot HDFS bootstrap --------
  hdfs-bootstrap:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      namenode:
        condition: service_healthy
    networks: [de-net]
    entrypoint: ["/bin/bash","-lc"]
    command: |
      set -e
      echo "▶ Bootstrapping HDFS..."
      /opt/hadoop-3.2.1/bin/hdfs dfs -mkdir -p /data/raw
      if ls -1 /data/reference/*.csv >/dev/null 2>&1; then
        /opt/hadoop-3.2.1/bin/hdfs dfs -put -f /data/reference/*.csv /data/raw
      fi
      echo "✅ HDFS bootstrap done"

  # ----------- Airflow metadata DB (separate from pipeline DB) -----------
  airflow-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    networks: [de-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---------------- Apache Airflow ----------------
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    platform: linux/amd64
    restart: on-failure   # retry if init fails (e.g. pip network timeout)
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "▶ Installing Python requirements..."
        pip install --no-cache-dir -q -r /opt/airflow/requirements.txt || true
        echo "▶ Initialising Airflow database..."
        # db init works on both a brand-new DB and an existing one (idempotent).
        # db migrate then applies any pending schema upgrades.
        airflow db init
        airflow db migrate
        echo "▶ Creating admin user..."
        airflow users create \
          --role Admin --username airflow --password airflow \
          --email airflow@example.com \
          --firstname Airflow --lastname Admin 2>/dev/null || true
        echo "▶ Registering Spark connection..."
        # Delete first so a re-run (docker compose down -v && up) always
        # gets a fresh connection with the correct extra.master field.
        # SparkSubmitHook reads extra.master for the --master flag;
        # --conf spark.master=... does NOT override it.
        airflow connections delete spark_default 2>/dev/null || true
        airflow connections add spark_default \
          --conn-type spark \
          --conn-host spark://spark-master \
          --conn-port 7077 \
          --conn-extra '{"deploy-mode": "client"}' 2>/dev/null || true
        echo "✅ Airflow init complete"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/spark_jobs:/opt/airflow/spark_jobs
      - ./airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ./src/scripts:/opt/airflow/scripts
      - airflow-logs:/opt/airflow/logs
      - airflow-pip:/home/airflow/.local
    depends_on:
      airflow-db:
        condition: service_healthy
    networks: [de-net]

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8083
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:8083
    command: >
      bash -c "
        airflow db check 2>/dev/null || (echo 'DB not ready — running db init...' && airflow db init && airflow db migrate) &&
        exec airflow webserver --port 8083
      "
    ports:
      - "8083:8083"   # Airflow UI
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/spark_jobs:/opt/airflow/spark_jobs
      - ./airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ./src/scripts:/opt/airflow/scripts
      - airflow-logs:/opt/airflow/logs
      - airflow-pip:/home/airflow/.local
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-db:
        condition: service_healthy
    networks: [de-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    platform: linux/amd64
    restart: unless-stopped
    hostname: airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    # Self-healing: if airflow-init ever misses or races, this guard re-runs
    # db init before starting the scheduler so the container never crash-loops.
    command: >
      bash -c "
        airflow db check 2>/dev/null || (echo 'DB not ready — running db init...' && airflow db init && airflow db migrate) &&
        exec airflow scheduler
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/spark_jobs:/opt/airflow/spark_jobs
      - ./airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ./src/scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
      - airflow-pip:/home/airflow/.local
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-db:
        condition: service_healthy
      kafka:
        condition: service_healthy   # ensure broker is ready before DAGs can fire
      spark-master:
        condition: service_started   # spark-master binds 7077 within ~5s of start
    networks: [de-net]

  # ---------------- Apache Superset ----------------
  superset:
    image: apache/superset:3.1.0
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - SUPERSET_SECRET_KEY=supersecretkey123456
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://nyc:nyc@postgres:5432/nyc
    ports:
      - "8089:8088"   # Superset UI
    depends_on:
      postgres:
        condition: service_healthy
    networks: [de-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

# ---------------- Shared Volumes & Network ----------------
volumes:
  hdfs-namenode: {}
  hdfs-datanode: {}
  pgdata: {}
  spark-events: {}
  spark-ivy2: {}    # reserved — not currently mounted (volume kept for future use)
  zookeeper-data: {}
  kafka-data: {}
  airflow-logs: {}
  airflow-pgdata: {}
  airflow-pip: {}

networks:
  de-net:
    driver: bridge
